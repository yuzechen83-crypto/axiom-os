# Axiom-OS CI: 单元测试 + 基准测试
# 每次 push/PR 运行 pytest 与 quick benchmark，防止回归
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: |
          pytest tests/test_benchmark_report.py axiom_os/tests/test_hippocampus.py -v -q

      - name: Run quick benchmark
        run: |
          python -m axiom_os.benchmarks.run_benchmarks --config quick --report --trend -o benchmark_ci.json

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            axiom_os/benchmarks/results/*.json
            axiom_os/benchmarks/results/*.png
            axiom_os/benchmarks/results/*.md
            axiom_os/benchmarks/results/*.html
            benchmark_ci.json

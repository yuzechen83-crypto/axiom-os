# Axiom-OS CI: 单元测试 + 基准测试 + 结果发布到 GitHub Pages
# 每次 push/PR 运行 pytest 与 quick benchmark；push 到 main 时发布结果
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-and-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Install scikit-learn (required by benchmark)
        run: pip install scikit-learn

      - name: Run pytest
        run: |
          pytest tests/test_benchmark_report.py axiom_os/tests/test_hippocampus.py -v -q

      - name: Run quick benchmark
        run: |
          python -m axiom_os.benchmarks.run_benchmarks --config quick --report --trend -o benchmark_ci.json --no-fail-on-alerts

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            axiom_os/benchmarks/results/*.json
            axiom_os/benchmarks/results/*.png
            axiom_os/benchmarks/results/*.md
            axiom_os/benchmarks/results/*.html
            benchmark_ci.json

  deploy-benchmark-pages:
    needs: test-and-benchmark
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment: github-pages
    continue-on-error: true  # 未启用 Pages 时 CI 仍通过
    steps:
      - name: Download benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results

      - name: Prepare site for GitHub Pages
        run: |
          SITE=benchmark-site
          mkdir -p "$SITE"
          # 最新报告与图表
          if [ -f axiom_os/benchmarks/results/benchmark_report.html ]; then
            cp axiom_os/benchmarks/results/benchmark_report.html "$SITE/report.html"
          fi
          for f in axiom_os/benchmarks/results/benchmark_comparison.png axiom_os/benchmarks/results/jhtdb_les_sgs_comparison.png axiom_os/benchmarks/results/jhtdb_les_sgs_3d.png; do
            [ -f "$f" ] && cp "$f" "$SITE/"
          done
          # 最新 JSON（优先 dated，否则 ci）
          LATEST_JSON=$(ls -t axiom_os/benchmarks/results/benchmark_*.json 2>/dev/null | head -1)
          if [ -n "$LATEST_JSON" ]; then
            cp "$LATEST_JSON" "$SITE/latest.json"
          elif [ -f benchmark_ci.json ]; then
            cp benchmark_ci.json "$SITE/latest.json"
          fi
          # 复制 JHTDB/crystallized 结果
          [ -f axiom_os/benchmarks/results/jhtdb_les_sgs.json ] && cp axiom_os/benchmarks/results/jhtdb_les_sgs.json "$SITE/"
          [ -f axiom_os/benchmarks/results/crystallized_formulas.json ] && cp axiom_os/benchmarks/results/crystallized_formulas.json "$SITE/"
          # 首页
          cat > "$SITE/index.html" << 'EOF'
          <!DOCTYPE html>
          <html lang="zh">
          <head><meta charset="utf-8"><title>Axiom-OS Benchmark</title>
          <style>body{font-family:system-ui,sans-serif;margin:2em;max-width:800px}
          a{color:#1565c0}h1{color:#1a237e}h2{color:#283593;margin-top:1.5em}
          ul{line-height:1.6}</style></head>
          <body>
          <h1>Axiom-OS 性能基准</h1>
          <h2>基准报告</h2>
          <ul>
            <li><a href="report.html">最新报告 (HTML)</a></li>
            <li><a href="latest.json">最新结果 (JSON)</a></li>
            <li><a href="benchmark_comparison.png">Discovery vs Baseline 对比图</a></li>
          </ul>
          <h2>湍流建模 (JHTDB LES-SGS)</h2>
          <ul>
            <li><a href="jhtdb_les_sgs.json">JHTDB 结果 (JSON)</a></li>
            <li><a href="jhtdb_les_sgs_comparison.png">Smagorinsky vs TBNN vs FNO 对比</a></li>
            <li><a href="jhtdb_les_sgs_3d.png">3D 可视化</a></li>
          </ul>
          <h2>公式结晶</h2>
          <ul>
            <li><a href="crystallized_formulas.json">RAR 结晶公式 (JSON)</a></li>
          </ul>
          <p><small>由 CI 在 push 到 main 时自动生成</small></p>
          </body></html>
          EOF

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: benchmark-site

  deploy-pages:
    needs: deploy-benchmark-pages
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment: github-pages
    continue-on-error: true  # 未启用 Pages 时 CI 仍通过
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
